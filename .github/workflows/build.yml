name: 编译并提交到仓库首页

on:
  push:
    branches:
      - main
    paths:
      - '**.cpp'
      - '.github/workflows/build.yml'

jobs:
  build-and-commit:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 设置 MSVC x64 编译环境
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: 编译 C++ 程序
        run: |
          cl /EHsc /std:c++latest /O2 miroot.cpp /link /out:"免解 BL ROOT 工具.exe"
        shell: cmd

      - name: 下载 UPX 并压缩
        run: |
          curl -sL https://github.com/upx/upx/releases/download/v4.2.4/upx-4.2.4-win64.zip -o upx.zip
          powershell "Expand-Archive upx.zip -Force"
          :: 直接用绝对路径调用 upx，避免找不到命令
          upx-4.2.4-win64\upx.exe --best --ultra-brute -f "免解 BL ROOT 工具.exe"
          :: 清理临时文件
          del /q upx.zip
          rmdir /s /q upx-4.2.4-win64
        shell: cmd

      - name: 提交编译结果
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add "免解 BL ROOT 工具.exe"
          git commit -m "CI: 自动编译程序" --allow-empty
          git push
        shell: bash
