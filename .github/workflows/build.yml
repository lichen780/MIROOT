name: 编译并提交到仓库首页

on:
  push:
    branches:
      - main
    paths:
      - '**.cpp'
      - '.github/workflows/build.yml'

jobs:
  build-and-commit:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: 设置 MSVC x64 编译环境
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: 编译 C++ 程序
        run: |
          cl /EHsc /std:c++latest /O2 miroot.cpp /link "/out:免解 BL ROOT 工具.exe"
        shell: cmd

      - name: UPX 极致压缩
        shell: cmd
        run: |
          curl -L https://github.com/upx/upx/releases/download/v5.1.1/upx-5.1.1-win64.zip -o upx.zip
          tar -xf upx.zip
          copy upx-5.1.1-win64\upx.exe .
          upx.exe --best --ultra-brute -f "免解 BL ROOT 工具.exe"
          del upx.zip upx.exe
          rmdir /s /q upx-5.1.1-win64

      - name: 提交编译产物
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add "免解 BL ROOT 工具.exe"
          git commit -m "CI: 自动编译程序"
          git push
        shell: bash
