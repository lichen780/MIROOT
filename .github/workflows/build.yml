name: 编译并提交到仓库首页

on:
  push:
    branches:
      - main
    paths:
      - '**.cpp'
      - '.github/workflows/build.yml'

jobs:
  build-and-commit:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 设置 MSVC x64 编译环境
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: 编译 C++ 程序
        run: |
          cl /EHsc /std:c++latest /O2 miroot.cpp /link /out:"免解 BL ROOT 工具.exe"
        shell: cmd

      # ==================== 自动获取最新 UPX 64 位 ====================
      - name: 自动下载最新版 UPX (win64)
        run: |
          powershell -Command "$latest = (Invoke-WebRequest 'https://api.github.com/repos/upx/upx/releases/latest' -UseBasicParsing | ConvertFrom-Json).tag_name; Invoke-WebRequest -Uri \"https://github.com/upx/upx/releases/download/$latest/upx-$latest-win64.zip\" -OutFile 'upx.zip' -UseBasicParsing"
          powershell -Command "Expand-Archive upx.zip -DestinationPath . -Force"
          cd upx-*-win64
          upx.exe --best -f "../免解 BL ROOT 工具.exe"
          cd ..
          del /q upx.zip
          rmdir /s /q upx-*-win64
        shell: cmd

      - name: 提交编译产物
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add "免解 BL ROOT 工具.exe"
          git commit -m "CI: 自动编译" --allow-empty
          git push
        shell: bash
