name: 编译并提交到仓库首页

on:
  push:
    branches:
      - main
    paths:
      - '**.cpp'
      - '.github/workflows/build.yml'

jobs:
  build-and-commit:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 设置 MSVC 编译环境
        uses: ilammy/msvc-dev-cmd@v1

      - name: 编译 C++ 程序
        run: |
          cl /EHsc /std:c++latest /O2 miroot.cpp /link /out:"免解 BL ROOT 工具.exe"
        shell: cmd

      - name: 下载 UPX 并压缩 exe
        run: |
          curl -sL https://github.com/upx/upx/releases/download/v4.2.4/upx-4.2.4-win64.zip -o upx.zip
          powershell -Command "Expand-Archive upx.zip -DestinationPath ."
          upx-4.2.4-win64\upx.exe --best "免解 BL ROOT 工具.exe"
          del /q upx.zip
          rmdir /s /q upx-4.2.4-win64
        shell: cmd

      - name: 提交 exe 到仓库
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add "免解 BL ROOT 工具.exe"
          git commit -m "自动更新编译产物 [CI]" --allow-empty
          git push
        shell: bash
