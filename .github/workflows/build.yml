name: 编译并提交到仓库首页

on:
  push:
    branches:
      - main
    paths:
      - '**.cpp'
      - '.github/workflows/build.yml'

jobs:
  build-and-commit:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 设置 MSVC x64 编译环境
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: 编译 C++ 程序
        run: |
          cl /EHsc /std:c++latest /O2 miroot.cpp /link /out:miroot.exe
        shell: cmd

      # ✅ 终极稳定 UPX 压缩
      - name: 下载 UPX 5.1.1 并压缩
        shell: powershell
        run: |
          iwr -Uri "https://github.com/upx/upx/releases/download/v5.1.1/upx-5.1.1-win64.zip" -OutFile "upx.zip"
          Expand-Archive "upx.zip"
          cd upx-5.1.1-win64
          .\upx.exe --best -f ..\miroot.exe
          cd ..
          del upx.zip
          rmdir upx-5.1.1-win64 -Recurse -Force

      - name: 提交编译产物
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add miroot.exe
          git commit -m "CI: 自动编译+UPX压缩"
          git push
        shell: bash
