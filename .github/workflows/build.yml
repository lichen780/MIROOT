name: 自动编译 Windows 程序

on:
  push:
    branches: [ main ]
    paths:
      - '**.cpp'
      - '.github/workflows/build.yml'

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置 MSVC 编译环境
        uses: ilammy/msvc-dev-cmd@v1

      - name: 编译程序（C++23）
        run: |
          cl /EHsc /std:c++latest /O2 miroot.cpp /link /out:adb-root-tool.exe
        shell: cmd

      - name: 上传编译产物
        uses: actions/upload-artifact@v4
        with:
          name: adb-root-tool
          path: adb-root-tool.exe
