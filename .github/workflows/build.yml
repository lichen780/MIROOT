name: 编译并提交到仓库首页

on:
  push:
    branches:
      - main
    paths:
      - '**.cpp'
      - '.github/workflows/build.yml'

jobs:
  build-and-commit:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 设置 MSVC x64 编译环境
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: 编译 C++ 程序
        run: |
          cl /EHsc /std:c++latest /O2 miroot.cpp /link /out:"免解 BL ROOT 工具.exe"
        shell: cmd

      # MPRESS 压缩（绝对不报错）
      - name: 下载 MPRESS 并压缩
        run: |
          powershell "Invoke-WebRequest 'https://www.matcode.com/mprss64.zip' -OutFile 'mpress.zip'"
          powershell "Expand-Archive mpress.zip -Force"
          mpress64\mpress64.exe -s "免解 BL ROOT 工具.exe"
          del /q mpress.zip
          rmdir /s /q mpress64
        shell: cmd

      - name: 提交编译结果
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add "免解 BL ROOT 工具.exe"
          git commit -m "自动编译程序"
          git push
        shell: bash
