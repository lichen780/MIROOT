name: 编译并提交到仓库首页

on:
  push:
    branches:
      - main
    paths:
      - '**.cpp'
      - '.github/workflows/build.yml'

jobs:
  build-and-commit:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: 设置 MSVC x64 编译环境
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: 编译 C++ 程序
        run: |
          cl /EHsc /std:c++latest /O2 miroot.cpp /link "/out:免解 BL ROOT 工具.exe"
        shell: cmd

      - name: UPX 极致压缩
        run: |
          # 临时重命名为英文文件名
          ren "免解 BL ROOT 工具.exe" "miroot_temp.exe"
          
          # 下载 UPX
          curl -L https://github.com/upx/upx/releases/download/v5.1.1/upx-5.1.1-win64.zip -o upx.zip
          tar -xf upx.zip
          copy upx-5.1.1-win64\upx.exe .
          
          # 压缩临时文件
          upx.exe --best --ultra-brute -f "miroot_temp.exe"
          
          # 重命名为中文文件名
          ren "miroot_temp.exe" "免解 BL ROOT 工具.exe"
          
          # 清理
          del upx.zip upx.exe
          rmdir /s /q upx-5.1.1-win64
        shell: cmd

      - name: 提交编译产物
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add "免解 BL ROOT 工具.exe"
          git commit -m "CI: 自动编译程序"
          git push
        shell: bash
